<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickPaste Suggestions</title>
  <link rel="stylesheet" href="./fonts.css">
  <link rel="stylesheet" href="./assets/tailwind.css">
  <style>
    :root {
      color-scheme: dark;
      --qp-bg: #12131a;
      --qp-surface: #1b1e29;
      --qp-border: #31364a;
      --qp-text: #e7e7ea;
      --qp-muted: #9aa0b4;
      --qp-primary: #4aa3ff;
      --qp-primary-soft: rgba(74, 163, 255, 0.14);
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      color: var(--qp-text);
      font-family: Inter, sans-serif;
      overflow: hidden;
    }
    body {
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 12%, rgba(74, 163, 255, 0.16), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(124, 58, 237, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(12, 14, 20, 0.98), rgba(8, 10, 15, 0.98));
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05), transparent 42%);
    }
    body::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
        linear-gradient(0deg, rgba(0, 0, 0, 0.26), transparent 18%);
      opacity: 0.7;
    }
    .shell {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(20, 23, 32, 0.98), rgba(12, 14, 20, 0.98));
      border: 1px solid color-mix(in srgb, var(--qp-border) 88%, transparent);
      border-radius: 14px;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .shell.above {
      flex-direction: column-reverse;
    }
    .search-wrap {
      border-bottom: 1px solid var(--qp-border);
    }
    .shell.above .search-wrap {
      border-top: 1px solid var(--qp-border);
      border-bottom: 0;
    }
    .search {
      height: 32px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--qp-surface) 94%, white 6%), color-mix(in srgb, var(--qp-surface) 88%, black));
      border: 1px solid color-mix(in srgb, var(--qp-border) 88%, transparent);
      color: var(--qp-text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .search:focus-visible,
    button:focus-visible {
      box-shadow: 0 0 0 3px var(--qp-focus-ring);
      outline: none;
    }
    .item {
      border: 1px solid rgba(255,255,255,0.06);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.018));
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      min-height: 24px;
    }
    .item:hover {
      transform: translateY(-1px);
      border-color: rgba(74, 163, 255, 0.38);
      background:
        linear-gradient(180deg, rgba(74, 163, 255, 0.10), rgba(74, 163, 255, 0.05));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }
    .primary {
      color: var(--qp-primary);
      background: var(--qp-primary-soft);
      border: 1px solid rgba(74, 163, 255, 0.18);
    }
    .trigger-pill {
      min-width: 0;
      max-width: 48%;
    }
    .preview-text {
      min-width: 0;
      max-width: 52%;
    }
    #list::-webkit-scrollbar {
      width: 8px;
    }
    #list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
    }
    #list::-webkit-scrollbar-track {
      background: transparent;
    }
    .item:active {
      transform: translateY(0);
    }
    .item[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    @media (max-width: 360px) {
      .shell {
        border-radius: 12px;
      }
    }
    /* Graphite Workspace suggestion popup */
    :root{--qp-bg:#0b0f14;--qp-surface:#121820;--qp-surface-2:#171e27;--qp-border:#283340;--qp-border-strong:#3b4a5b;--qp-text:#f2f5f7;--qp-muted:#8e9baa;--qp-primary:#35c6af;--qp-primary-soft:rgb(53 198 175/11%);--qp-focus-ring:rgb(53 198 175/28%)}body{background:transparent!important}.shell{border:1px solid var(--qp-border-strong)!important;border-radius:9px!important;background:var(--qp-surface)!important;box-shadow:0 16px 42px rgb(0 0 0/52%)!important}.search-wrap{padding:7px!important;border-color:var(--qp-border)!important;background:var(--qp-surface-2)!important}.search{height:34px!important;padding-inline:10px!important;border:1px solid var(--qp-border)!important;border-radius:6px!important;background:var(--qp-bg)!important;color:var(--qp-text)!important;font-family:'JetBrains Mono',monospace!important;font-size:12px!important}.search:focus-visible{border-color:var(--qp-primary)!important;box-shadow:0 0 0 3px var(--qp-focus-ring)!important}#list{padding:5px!important;gap:3px!important}.item{min-height:38px!important;padding:7px 8px!important;border:1px solid transparent!important;border-radius:6px!important;background:transparent!important;box-shadow:none!important}.item:hover,.item.selected{transform:none!important;border-color:rgb(53 198 175/30%)!important;background:var(--qp-primary-soft)!important;box-shadow:inset 2px 0 var(--qp-primary)!important}.primary{border:1px solid rgb(53 198 175/22%)!important;border-radius:4px!important;background:var(--qp-primary-soft)!important;color:var(--qp-primary)!important}.trigger-pill{font-family:'JetBrains Mono',monospace!important}.preview-text{color:var(--qp-muted)!important}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
  <!-- Unified graphite+teal tokens & utility layer (loads last to win) -->
  <link rel="stylesheet" href="./styles.css">
 </head>
<body>
  <div class="shell">
    <div id="searchWrap" class="search-wrap px-2.5 pt-2.5 pb-2">
      <input id="filterInput" class="search w-full rounded-xl px-3 text-sm" placeholder=":fix" />
    </div>

    <div id="list" class="flex-1 overflow-y-auto p-1.5 flex flex-col gap-1"></div>
  </div>

  <script src="./suggestions.js" type="module"></script>
</body>
</html>
